<!DOCTYPE html>
<html>
<head>
    <title>CORS Test - Suraksha-Setu</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🧪 CORS Test - Suraksha-Setu Backend</h1>
    <p><strong>Backend URL:</strong> https://7dd0-103-231-44-233.ngrok-free.app</p>
    
    <button onclick="testGET()">Test GET Request</button>
    <button onclick="testPOST()">Test POST Request</button>
    <button onclick="testOPTIONS()">Test OPTIONS (Preflight)</button>
    <button onclick="testWebSocket()">Test WebSocket</button>
    
    <h2>Results:</h2>
    <div id="results"></div>
    
    <script>
        const API_URL = 'https://7dd0-103-231-44-233.ngrok-free.app';
        const resultsDiv = document.getElementById('results');
        
        function log(message, isError = false) {
            const p = document.createElement('p');
            p.className = isError ? 'error' : 'success';
            p.textContent = message;
            resultsDiv.appendChild(p);
        }
        
        function logJSON(data) {
            const pre = document.createElement('pre');
            pre.textContent = JSON.stringify(data, null, 2);
            resultsDiv.appendChild(pre);
        }
        
        async function testGET() {
            resultsDiv.innerHTML = '<h3>Testing GET Request...</h3>';
            try {
                const response = await fetch(`${API_URL}/api/cameras/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                log('✅ GET Request Success!');
                log(`Status: ${response.status} ${response.statusText}`);
                
                // Check CORS headers
                const corsHeader = response.headers.get('access-control-allow-origin');
                log(`CORS Header: ${corsHeader || 'NOT FOUND'}`);
                
                const data = await response.json();
                log('Response Data:');
                logJSON(data);
                
            } catch (error) {
                log(`❌ GET Request Failed: ${error.message}`, true);
                console.error(error);
            }
        }
        
        async function testPOST() {
            resultsDiv.innerHTML = '<h3>Testing POST Request...</h3>';
            try {
                const testCamera = {
                    camera_id: 'test_cors_' + Date.now(),
                    source: '0',
                    location: 'CORS Test Camera',
                    type: 'normal'
                };
                
                const response = await fetch(`${API_URL}/api/cameras/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testCamera)
                });
                
                log('✅ POST Request Success!');
                log(`Status: ${response.status} ${response.statusText}`);
                
                const corsHeader = response.headers.get('access-control-allow-origin');
                log(`CORS Header: ${corsHeader || 'NOT FOUND'}`);
                
                const data = await response.json();
                log('Response Data:');
                logJSON(data);
                
                // Cleanup
                if (data.camera && data.camera.camera_id) {
                    await fetch(`${API_URL}/api/cameras/${data.camera.camera_id}`, {
                        method: 'DELETE'
                    });
                    log('🗑️ Test camera deleted');
                }
                
            } catch (error) {
                log(`❌ POST Request Failed: ${error.message}`, true);
                console.error(error);
            }
        }
        
        async function testOPTIONS() {
            resultsDiv.innerHTML = '<h3>Testing OPTIONS (Preflight) Request...</h3>';
            try {
                const response = await fetch(`${API_URL}/api/cameras/`, {
                    method: 'OPTIONS',
                    headers: {
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'content-type'
                    }
                });
                
                log('✅ OPTIONS Request Success!');
                log(`Status: ${response.status} ${response.statusText}`);
                
                // Check all CORS headers
                const headers = {
                    'access-control-allow-origin': response.headers.get('access-control-allow-origin'),
                    'access-control-allow-methods': response.headers.get('access-control-allow-methods'),
                    'access-control-allow-headers': response.headers.get('access-control-allow-headers'),
                    'access-control-allow-credentials': response.headers.get('access-control-allow-credentials'),
                    'access-control-max-age': response.headers.get('access-control-max-age')
                };
                
                log('CORS Headers:');
                logJSON(headers);
                
            } catch (error) {
                log(`❌ OPTIONS Request Failed: ${error.message}`, true);
                console.error(error);
            }
        }
        
        function testWebSocket() {
            resultsDiv.innerHTML = '<h3>Testing WebSocket Connection...</h3>';
            try {
                const ws = new WebSocket('wss://7dd0-103-231-44-233.ngrok-free.app/ws');
                
                ws.onopen = () => {
                    log('✅ WebSocket Connected!');
                    ws.close();
                };
                
                ws.onerror = (error) => {
                    log(`❌ WebSocket Error: ${error.message || 'Connection failed'}`, true);
                };
                
                ws.onclose = () => {
                    log('WebSocket Closed');
                };
                
            } catch (error) {
                log(`❌ WebSocket Failed: ${error.message}`, true);
                console.error(error);
            }
        }
        
        // Auto-run GET test on load
        window.onload = () => {
            log('🚀 CORS Test Page Loaded');
            log('Click buttons above to test different requests');
        };
    </script>
</body>
</html>
